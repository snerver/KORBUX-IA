<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Monet · Generación visual semántica</title>

  <!-- Favicon (ruta corregida) -->
  <link rel="icon" href="../assets/img/logo.png" type="image/png" />

  <!-- LokiJS (base de datos local) -->
  <script src="https://cdn.jsdelivr.net/npm/lokijs@1.5.12/build/lokijs.min.js"></script>

  <!-- Estilos integrados — mismo diseño que index.html -->
  <style>
    /* ===== RESET & VARIABLES ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    :root {
      --bg-body: #f9fafb;
      --bg-nav: #ffffff;
      --bg-sidebar: #f3f4f6;
      --bg-chat: #ffffff;
      --border-light: #e5e7eb;
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --text-muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --bubble-user: #e0f2fe;
      --bubble-ai: #ffffff;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
    }

    body.dark {
      --bg-body: #1e1e2f;
      --bg-nav: #2a2a3c;
      --bg-sidebar: #252537;
      --bg-chat: #1a1a2a;
      --border-light: #3a3a50;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --bubble-user: #2d3a5e;
      --bubble-ai: #2a2a3c;
    }

    body {
      background-color: var(--bg-body);
      color: var(--text-primary);
      display: flex;
      height: 100vh;
      overflow: hidden;
      line-height: 1.5;
      transition: background-color 0.2s, color 0.2s;
    }

    /* ===== NAVEGACIÓN LATERAL IZQUIERDA ===== */
    .nav {
      width: 88px;
      background-color: var(--bg-nav);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.2rem 0.5rem;
      border-right: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
      overflow-y: auto;
    }

    .logo {
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: -0.5px;
      color: var(--accent);
      text-decoration: none;
      margin-bottom: 2rem;
      padding: 0.25rem;
      transition: opacity 0.2s;
    }

    .logo:hover {
      opacity: 0.8;
    }

    .nav-icons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      align-items: center;
      flex: 1;
    }

    .nav-icons a {
      display: block;
      width: 100%;
      text-align: center;
      padding: 0.6rem 0.2rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      border-radius: 12px;
      background-color: transparent;
      transition: background-color 0.15s, color 0.15s;
      word-break: break-word;
    }

    .nav-icons a:hover {
      background-color: var(--border-light);
      color: var(--text-primary);
    }

    .nav-icons a.active {
      background-color: var(--accent);
      color: white;
    }

    .nav-bottom {
      margin-top: auto;
      padding-top: 1rem;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    #theme,
    #lang-select {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-primary);
      padding: 0.5rem 0.2rem;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
    }

    #lang-select {
      background: var(--bg-nav);
      margin-bottom: 0.25rem;
    }

    #theme:hover {
      background-color: var(--border-light);
    }

    /* ===== CONTENEDOR PRINCIPAL ===== */
    .main {
      display: flex;
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .sidebar {
      width: 280px;
      background-color: var(--bg-sidebar);
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      padding: 1.25rem 1rem;
      overflow-y: auto;
      flex-shrink: 0;
    }

    #new-chat {
      background-color: var(--accent);
      color: white;
      font-weight: 600;
      border: none;
      padding: 0.75rem 1rem;
      border-radius: 30px;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      transition: background 0.2s;
      box-shadow: var(--shadow-sm);
    }

    #new-chat:hover {
      background-color: var(--accent-hover);
    }

    .recent-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      padding-left: 0.25rem;
    }

    #chats {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    #chats li {
      padding: 0.6rem 0.75rem;
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.15s;
    }

    #chats li:hover {
      background-color: var(--border-light);
    }

    /* ===== ÁREA DE CHAT ===== */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-chat);
      min-width: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .monet-container {
      padding: 2rem 2.5rem;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .monet-header {
      margin-bottom: 2rem;
    }

    .monet-header h2 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    #monet-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    #visual-input {
      min-height: 120px;
      border-radius: 1.5rem;
      padding: 1.2rem 1.5rem;
      font-size: 1rem;
      border: 1px solid var(--border-light);
      background: var(--bg-body);
      color: var(--text-primary);
      resize: vertical;
      box-shadow: var(--shadow-sm);
      transition: border 0.15s;
    }

    #visual-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
    }

    #generate-btn {
      align-self: flex-start;
      padding: 0.9rem 2.2rem;
      border-radius: 40px;
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      box-shadow: var(--shadow-sm);
    }

    #generate-btn:hover {
      background: var(--accent-hover);
    }

    #visual-output {
      background: var(--bg-sidebar);
      padding: 1.8rem;
      border-radius: 1.5rem;
      border: 1px solid var(--border-light);
    }

    #visual-output strong {
      display: block;
      margin-bottom: 1rem;
      color: var(--accent);
    }

    #imagen-generada {
      min-height: 80px;
      background: var(--bg-chat);
      border-radius: 12px;
      padding: 1.2rem;
      margin-bottom: 1rem;
      border: 1px dashed var(--border-light);
    }

    .log {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* Responsive */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .nav {
        width: 100%;
        height: auto;
        flex-direction: row;
        padding: 0.5rem 1rem;
        border-right: none;
        border-bottom: 1px solid var(--border-light);
        overflow-x: auto;
        justify-content: space-between;
      }

      .logo {
        margin-bottom: 0;
        margin-right: 0.5rem;
        font-size: 1.3rem;
      }

      .nav-icons {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 0.25rem;
        flex: 1;
        justify-content: flex-start;
      }

      .nav-icons a {
        width: auto;
        padding: 0.4rem 0.8rem;
        font-size: 0.8rem;
      }

      .nav-bottom {
        margin-top: 0;
        padding-top: 0;
        width: auto;
        flex-direction: row;
        gap: 0.5rem;
      }

      #theme,
      #lang-select {
        width: auto;
        padding: 0.4rem 1rem;
      }

      .main {
        flex-direction: column;
        height: calc(100vh - 70px);
      }

      .sidebar {
        width: 100%;
        max-height: 140px;
        border-right: none;
        border-bottom: 1px solid var(--border-light);
        padding: 0.75rem;
      }

      .chat-area {
        height: auto;
        flex: 1;
      }

      .monet-container {
        padding: 1.5rem 1rem;
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background-color: var(--border-light);
      border-radius: 20px;
    }

    *:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    button,
    a,
    select {
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- Barra lateral fija (navegación) -->
  <nav class="nav" aria-label="Navegación principal" role="navigation">
    <a class="logo" href="../index.html" aria-label="Korbux inicio">Korbux</a>

    <!-- Accesos a agentes (estáticos, con active en Monet) -->
    <div class="nav-icons" aria-label="Agentes disponibles">
      <a href="okuota.html" title="Okuota">Okuota</a>
      <a href="Monet.html" class="active" aria-current="page" title="Monet">Monet</a>
      <a href="Ditters.html" title="Ditters">Ditters</a>
      <a href="Jean.html" title="Jean">Jean</a>
      <a href="Lovelace.html" title="Lovelace">Lovelace</a>
      <a href="Santa_olalla.html" title="Santa Olalla">Santa Olalla</a>
      <a href="../Perfil.html" title="Perfil">Perfil</a>
      <a href="../Historial.html" title="Historial">Historial</a>
    </div>

    <!-- Controles inferiores: selector de idioma y tema -->
    <div class="nav-bottom">
      <select id="lang-select" aria-label="Seleccionar idioma">
        <option value="es" selected>Español</option>
        <option value="en">English</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="af">Afrikaans</option>
      </select>
      <button id="theme" type="button" aria-pressed="false" aria-label="Cambiar tema">
        <span>Tema</span>
      </button>
    </div>
  </nav>

  <!-- Área principal (sidebar + chat) -->
  <main class="main" id="main-content">

    <!-- Sidebar de chats recientes -->
    <aside class="sidebar" aria-label="Chats recientes">
      <button id="new-chat" type="button" aria-label="Crear nuevo chat">
        <span>+</span> Nuevo Chat
      </button>

      <h2 class="recent-title" id="recent-chats-title">Chats recientes</h2>
      <ul id="chats" aria-live="polite" aria-labelledby="recent-chats-title"></ul>
    </aside>

    <!-- Área de contenido de Monet -->
    <section class="chat-area" aria-label="Área de generación visual Monet">
      <div class="monet-container">
        <div class="monet-header">
          <h2>🎨 Monet · Generación visual semántica</h2>
          <p style="color: var(--text-secondary); margin-top: 0.5rem;">Describe una imagen y explora conceptos visuales.
          </p>
        </div>

        <form id="monet-form" autocomplete="off">
          <textarea id="visual-input" placeholder="Ej. Quiero que me dibujes un esternocleidomastoideo..."
            required></textarea>
          <button id="generate-btn" type="submit">Procesar</button>
        </form>

        <div id="visual-output">
          <strong>Resultado:</strong>
          <div id="imagen-generada">[esperando instrucción...]</div>
          <div class="log" id="registro-log"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Lógica JavaScript (LokiJS, tema, idioma, generación) -->
  <script>
    (function () {
      // ---------- TEMA ----------
      const themeBtn = document.getElementById('theme');
      function initTheme() {
        const savedTheme = localStorage.getItem('korbux-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
          document.body.classList.add('dark');
          themeBtn.setAttribute('aria-pressed', 'true');
          themeBtn.innerHTML = '<span>Tema claro</span>';
        } else {
          themeBtn.setAttribute('aria-pressed', 'false');
          themeBtn.innerHTML = '<span>Tema oscuro</span>';
        }
      }
      initTheme();

      themeBtn.addEventListener('click', () => {
        const isDark = document.body.classList.toggle('dark');
        themeBtn.setAttribute('aria-pressed', isDark ? 'true' : 'false');
        themeBtn.innerHTML = isDark ? '<span>Tema claro</span>' : '<span>Tema oscuro</span>';
        localStorage.setItem('korbux-theme', isDark ? 'dark' : 'light');
      });

      // ---------- IDIOMA (selector funcional, guarda preferencia) ----------
      const langSelect = document.getElementById('lang-select');
      const savedLang = localStorage.getItem('monet-lang') || 'es';
      langSelect.value = savedLang;
      langSelect.addEventListener('change', () => {
        localStorage.setItem('monet-lang', langSelect.value);
        // Aquí se podría implementar traducción, por ahora solo guarda
        console.log('Idioma seleccionado:', langSelect.value);
      });

      // ---------- BASE DE DATOS LOKIJS ----------
      let dbReady = false;
      let conocimientoCollection = null;
      let auditoriaCollection = null;
      let dbInstance = null;

      function inicializarLoki() {
        try {
          dbInstance = new loki("korbux.json", {
            autoload: true,
            autosave: true,
            autosaveInterval: 5000,
            autoloadCallback: (err) => {
              if (err) {
                console.error("Error al cargar LokiJS:", err);
                if (!dbInstance.getCollection("conocimiento")) {
                  dbInstance.addCollection("conocimiento", { unique: ["palabra"] });
                }
                if (!dbInstance.getCollection("auditoria")) {
                  dbInstance.addCollection("auditoria");
                }
                conocimientoCollection = dbInstance.getCollection("conocimiento");
                auditoriaCollection = dbInstance.getCollection("auditoria");
                dbReady = true;
                return;
              }

              if (!dbInstance.getCollection("conocimiento")) {
                dbInstance.addCollection("conocimiento", { unique: ["palabra"] });
              }
              if (!dbInstance.getCollection("auditoria")) {
                dbInstance.addCollection("auditoria");
              }

              conocimientoCollection = dbInstance.getCollection("conocimiento");
              auditoriaCollection = dbInstance.getCollection("auditoria");
              dbReady = true;
            }
          });
        } catch (e) {
          console.error("Fallo crítico LokiJS:", e);
          dbReady = false;
        }
      }
      inicializarLoki();

      // ---------- EXTRACCIÓN DE PALABRAS CLAVE ----------
      const STOP_WORDS = new Set([
        "quiero", "que", "me", "dibujes", "un", "una", "el", "la", "los", "las",
        "por", "favor", "para", "con", "sin", "sobre", "ante", "bajo", "cabe",
        "contra", "desde", "durante", "entre", "hacia", "hasta", "mediante",
        "según", "tras", "y", "o", "pero", "mas", "a", "ante"
      ]);

      function extraerPalabrasClave(texto) {
        if (!texto) return [];
        return texto.toLowerCase()
          .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
          .split(/\W+/)
          .filter(p => p && p.length >= 4 && !STOP_WORDS.has(p));
      }

      // ---------- MANEJO DEL FORMULARIO ----------
      const form = document.getElementById('monet-form');
      const visualInput = document.getElementById('visual-input');
      const imagenDiv = document.getElementById('imagen-generada');
      const logDiv = document.getElementById('registro-log');

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const texto = visualInput.value.trim();
        if (!texto) {
          imagenDiv.innerHTML = '[esperando instrucción...]';
          return;
        }

        if (!dbReady) {
          imagenDiv.innerHTML = 'Base de datos cargando... espera un momento.';
          return;
        }

        const claves = extraerPalabrasClave(texto);
        logDiv.innerHTML = '';

        if (claves.length === 0) {
          imagenDiv.innerHTML = `No se detectaron conceptos visuales relevantes. Intenta con términos más específicos.`;
          return;
        }

        // Registrar en LokiJS
        claves.forEach(p => {
          if (!conocimientoCollection.findOne({ palabra: p })) {
            conocimientoCollection.insert({
              palabra: p,
              significado: "Concepto visual pendiente",
              contexto: "Monet",
              usuario: "daniel_korbux",
              fecha_registro: new Date().toISOString()
            });
            if (auditoriaCollection) {
              auditoriaCollection.insert({
                tipo: "aprendizaje_visual",
                palabra: p,
                usuario: "daniel_korbux",
                fecha: new Date().toISOString(),
                modulo: "Monet"
              });
            }
            logDiv.innerHTML += `Nuevo concepto visual: <strong>${p}</strong><br>`;
          } else {
            logDiv.innerHTML += `Concepto ya conocido: <strong>${p}</strong><br>`;
          }
        });

        // Simulación de generación visual
        const principal = claves[0];
        imagenDiv.innerHTML = `🎨 Generando representación visual para: <strong>${principal}</strong><br>
                               <span style="color: var(--text-muted);">(Simulación conceptual: estilo Monet aplicado a "${principal}")</span>`;

        // Auditoría de consulta
        if (auditoriaCollection) {
          auditoriaCollection.insert({
            tipo: "consulta_visual",
            consulta: texto.substring(0, 200),
            conceptos: claves,
            usuario: "daniel_korbux",
            timestamp: new Date().toISOString(),
            modulo: "Monet"
          });
        }
      });

      // Auto-ajuste de textarea
      visualInput.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 200) + 'px';
      });

      // Placeholder dinámico por idioma (opcional)
      langSelect.addEventListener('change', () => {
        const placeholders = {
          es: 'Ej. Quiero que me dibujes un esternocleidomastoideo...',
          en: 'E.g., Draw me a sternocleidomastoid...',
          fr: 'Ex. Dessine-moi un sterno-cléido-mastoïdien...',
          de: 'z.B. Zeichne mir einen Sternocleidomastoideus...',
          af: 'Bv. Teken vir my \'n sternocleidomastoid...'
        };
        visualInput.placeholder = placeholders[langSelect.value] || placeholders.es;
      });
      // Disparar una vez para establecer placeholder inicial
      langSelect.dispatchEvent(new Event('change'));

    })();
  </script>
</body>

</html>
