<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Korbux IA</title>

  <!-- Favicon (ruta corregida) -->
  <link rel="icon" href="../assets/img/logo.png" type="image/png" />

  <!-- Estilos integrados -->
  <style>
    /* ===== RESET & VARIABLES ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    :root {
      --bg-body: #f9fafb;
      --bg-nav: #ffffff;
      --bg-sidebar: #f3f4f6;
      --bg-chat: #ffffff;
      --border-light: #e5e7eb;
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --text-muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --bubble-user: #e0f2fe;
      --bubble-ai: #ffffff;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
    }

    body.dark {
      --bg-body: #1e1e2f;
      --bg-nav: #2a2a3c;
      --bg-sidebar: #252537;
      --bg-chat: #1a1a2a;
      --border-light: #3a3a50;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --bubble-user: #2d3a5e;
      --bubble-ai: #2a2a3c;
    }

    body {
      background-color: var(--bg-body);
      color: var(--text-primary);
      display: flex;
      height: 100vh;
      overflow: hidden;
      line-height: 1.5;
      transition: background-color 0.2s, color 0.2s;
    }

    /* ===== NAVEGACIÓN LATERAL IZQUIERDA ===== */
    .nav {
      width: 88px;
      background-color: var(--bg-nav);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.2rem 0.5rem;
      border-right: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
      overflow-y: auto;
    }

    .logo {
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: -0.5px;
      color: var(--accent);
      text-decoration: none;
      margin-bottom: 2rem;
      padding: 0.25rem;
      transition: opacity 0.2s;
    }

    .logo:hover {
      opacity: 0.8;
    }

    .nav-icons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      align-items: center;
      flex: 1;
    }

    .nav-icons a {
      display: block;
      width: 100%;
      text-align: center;
      padding: 0.6rem 0.2rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      border-radius: 12px;
      background-color: transparent;
      transition: background-color 0.15s, color 0.15s;
      word-break: break-word;
    }

    .nav-icons a:hover {
      background-color: var(--border-light);
      color: var(--text-primary);
    }

    .nav-icons a.active {
      background-color: var(--accent);
      color: white;
    }

    .nav-bottom {
      margin-top: auto;
      padding-top: 1rem;
      width: 100%;
    }

    #theme {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-primary);
      padding: 0.5rem 0.2rem;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    #theme:hover {
      background-color: var(--border-light);
    }

    #theme span {
      pointer-events: none;
    }

    /* ===== CONTENEDOR PRINCIPAL ===== */
    .main {
      display: flex;
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .sidebar {
      width: 280px;
      background-color: var(--bg-sidebar);
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      padding: 1.25rem 1rem;
      overflow-y: auto;
      flex-shrink: 0;
    }

    #new-chat {
      background-color: var(--accent);
      color: white;
      font-weight: 600;
      border: none;
      padding: 0.75rem 1rem;
      border-radius: 30px;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      transition: background 0.2s;
      box-shadow: var(--shadow-sm);
    }

    #new-chat:hover {
      background-color: var(--accent-hover);
    }

    .recent-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      padding-left: 0.25rem;
    }

    #chats {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    #chats li {
      padding: 0.6rem 0.75rem;
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.15s;
    }

    #chats li:hover {
      background-color: var(--border-light);
    }

    /* ===== ÁREA DE CHAT ===== */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-chat);
      min-width: 0;
      height: 100vh;
    }

    #history {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.5rem 0.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    .welcome-message {
      background-color: var(--bubble-ai);
      padding: 1.5rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
      max-width: 80%;
      align-self: center;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeIn 0.2s ease;
    }

    .message.user {
      align-self: flex-end;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .message-content {
      padding: 0.9rem 1.2rem;
      border-radius: 1.25rem;
      line-height: 1.5;
      box-shadow: var(--shadow-sm);
      word-wrap: break-word;
    }

    .message.user .message-content {
      background-color: var(--bubble-user);
      color: var(--text-primary);
      border-bottom-right-radius: 0.25rem;
      border: 1px solid var(--border-light);
    }

    .message.assistant .message-content {
      background-color: var(--bubble-ai);
      border: 1px solid var(--border-light);
      border-bottom-left-radius: 0.25rem;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== FORMULARIO ===== */
    #form {
      padding: 1rem 1.5rem 1.5rem 1.5rem;
      background-color: var(--bg-chat);
      border-top: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    #input {
      width: 100%;
      resize: none;
      background-color: var(--bg-body);
      border: 1px solid var(--border-light);
      border-radius: 1.5rem;
      padding: 0.9rem 1.2rem;
      font-size: 1rem;
      color: var(--text-primary);
      outline: none;
      transition: border 0.15s, box-shadow 0.15s;
      line-height: 1.5;
      max-height: 180px;
      box-shadow: var(--shadow-sm);
    }

    #input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
    }

    .input-buttons {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    .input-btn {
      background: transparent;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
      transition: background 0.2s, color 0.2s;
      padding: 0;
    }

    .input-btn:hover {
      background-color: var(--border-light);
      color: var(--accent);
    }

    .input-btn img {
      width: 22px;
      height: 22px;
      object-fit: contain;
    }

    body.dark .input-btn img {
      filter: invert(85%);
    }

    #file-input {
      display: none;
    }

    /* Responsive */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .nav {
        width: 100%;
        height: auto;
        flex-direction: row;
        padding: 0.5rem 1rem;
        border-right: none;
        border-bottom: 1px solid var(--border-light);
        overflow-x: auto;
        justify-content: space-between;
      }

      .logo {
        margin-bottom: 0;
        margin-right: 0.5rem;
        font-size: 1.3rem;
      }

      .nav-icons {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 0.25rem;
        flex: 1;
        justify-content: flex-start;
      }

      .nav-icons a {
        width: auto;
        padding: 0.4rem 0.8rem;
        font-size: 0.8rem;
      }

      .nav-bottom {
        margin-top: 0;
        padding-top: 0;
        width: auto;
      }

      #theme {
        width: auto;
        padding: 0.4rem 1rem;
      }

      .main {
        flex-direction: column;
        height: calc(100vh - 70px);
      }

      .sidebar {
        width: 100%;
        max-height: 180px;
        border-right: none;
        border-bottom: 1px solid var(--border-light);
        padding: 0.75rem;
      }

      .chat-area {
        height: auto;
        flex: 1;
      }

      #history {
        padding: 1rem;
      }

      #form {
        padding: 0.75rem 1rem;
      }

      .welcome-message {
        max-width: 95%;
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background-color: var(--border-light);
      border-radius: 20px;
    }

    *:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    button,
    a,
    .input-btn {
      cursor: pointer;
    }

    #input::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <!-- Barra lateral fija (navegación) -->
  <nav class="nav" aria-label="Navegación principal" role="navigation">
    <!-- Logo enlaza al index.html en el mismo directorio (View/) -->
    <a class="logo" href="index.html" aria-label="Korbux inicio">Korbux</a>

    <!-- Accesos a agentes (rutas corregidas: los agentes están dentro de View/Agentes/) -->
    <div class="nav-icons" aria-label="Agentes disponibles">
      <a href="Agentes/okuota.html" title="Okuota" aria-label="Okuota">Okuota</a>
      <a href="Agentes/Monet.html" title="Monet" aria-label="Monet">Monet</a>
      <a href="Agentes/Ditters.html" title="Ditters" aria-label="Ditters">Ditters</a>
      <a href="Agentes/Jean.html" title="Jean" aria-label="Jean">Jean</a>
      <a href="Agentes/Lovelace.html" title="Lovelace" aria-label="Lovelace">Lovelace</a>
      <a href="Agentes/Santa_olalla.html" title="Santa Olalla" aria-label="Santa Olalla">Santa Olalla</a>
      <!-- Perfil e Historial están en el directorio raíz (un nivel arriba) -->
      <a href="../Perfil.html" title="Perfil" aria-label="Perfil">Perfil</a>
      <a href="../Historial.html" title="Historial" class="active" aria-current="page" aria-label="Historial">
        Historial
      </a>
    </div>

    <!-- Botón de tema -->
    <div class="nav-bottom">
      <button id="theme" type="button" aria-pressed="false" aria-label="Cambiar tema">
        <span>Tema</span>
      </button>
    </div>
  </nav>

  <!-- Área principal -->
  <main class="main" id="main-content">

    <!-- Sidebar de chats recientes -->
    <aside class="sidebar" aria-label="Chats recientes">
      <button id="new-chat" type="button" aria-label="Crear nuevo chat">
        <span>+</span> Nuevo Chat
      </button>

      <h2 class="recent-title" id="recent-chats-title">Chats recientes</h2>
      <ul id="chats" aria-live="polite" aria-labelledby="recent-chats-title"></ul>
    </aside>

    <!-- Área de conversación -->
    <section class="chat-area" aria-label="Área de conversación">

      <div id="history" aria-live="polite" aria-relevant="additions" aria-atomic="false">
        <div class="welcome-message" style="text-align: center; padding: 2rem; color: var(--gray-text);">
          <p>Bienvenido a Korbux. Escribe un mensaje para comenzar.</p>
        </div>
      </div>

      <!-- Formulario -->
      <form id="form" autocomplete="off" aria-label="Enviar mensaje" novalidate>

        <textarea id="input" name="mensaje" placeholder="Escribe tu mensaje aquí..." rows="3"
          aria-label="Campo de texto del mensaje"></textarea>

        <div class="input-buttons">

          <label class="input-btn" for="file-input" title="Subir archivo" aria-label="Adjuntar archivo">
            <input type="file" id="file-input" hidden />
            <img src="../assets/adjunto.png" alt="Adjuntar archivo" loading="lazy" />
          </label>

          <button type="button" class="input-btn" id="voice-btn" title="Grabar audio" aria-label="Grabar audio">
            <img src="../assets/microfono.png" alt="Grabar audio" loading="lazy" />
          </button>

          <button type="submit" class="input-btn" id="send-btn" title="Enviar mensaje" aria-label="Enviar mensaje">
            <img src="../assets/enviar.png" alt="Enviar mensaje" loading="lazy" />
          </button>

        </div>
      </form>

    </section>
  </main>

  <!-- JavaScript externo (corregido a ../script.js) -->
  <script src="../script.js" defer></script>

  <!-- Script inline para tema y mejoras -->
  <script>
    (function () {
      const themeBtn = document.getElementById('theme');
      if (themeBtn) {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const storedTheme = localStorage.getItem('korbux-theme');
        if (storedTheme === 'dark' || (!storedTheme && prefersDark)) {
          document.body.classList.add('dark');
          themeBtn.setAttribute('aria-pressed', 'true');
        } else {
          themeBtn.setAttribute('aria-pressed', 'false');
        }

        themeBtn.addEventListener('click', () => {
          const isDark = document.body.classList.toggle('dark');
          themeBtn.setAttribute('aria-pressed', isDark ? 'true' : 'false');
          localStorage.setItem('korbux-theme', isDark ? 'dark' : 'light');
        });
      }

      const fileLabel = document.querySelector('label.input-btn[for="file-input"]');
      const fileInput = document.getElementById('file-input');
      if (fileLabel && fileInput) {
        fileLabel.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            fileInput.click();
          }
        });
      }

      const textarea = document.getElementById('input');
      if (textarea) {
        textarea.addEventListener('input', function () {
          this.style.height = 'auto';
          this.style.height = Math.min(this.scrollHeight, 180) + 'px';
        });
      }
    })();
  </script>

</body>

</html>
