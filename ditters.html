<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ditters · Generador musical</title>

  <!-- Favicon (ruta corregida) -->
  <link rel="icon" href="../assets/img/logo.png" type="image/png" />

  <!-- LokiJS (base de datos local) -->
  <script src="https://cdn.jsdelivr.net/npm/lokijs@1.5.12/build/lokijs.min.js"></script>

  <!-- Estilos integrados — mismo diseño que index.html -->
  <style>
    /* ===== RESET & VARIABLES ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    :root {
      --bg-body: #f9fafb;
      --bg-nav: #ffffff;
      --bg-sidebar: #f3f4f6;
      --bg-chat: #ffffff;
      --border-light: #e5e7eb;
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --text-muted: #6b7280;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --bubble-user: #e0f2fe;
      --bubble-ai: #ffffff;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
    }

    body.dark {
      --bg-body: #1e1e2f;
      --bg-nav: #2a2a3c;
      --bg-sidebar: #252537;
      --bg-chat: #1a1a2a;
      --border-light: #3a3a50;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --bubble-user: #2d3a5e;
      --bubble-ai: #2a2a3c;
    }

    body {
      background-color: var(--bg-body);
      color: var(--text-primary);
      display: flex;
      height: 100vh;
      overflow: hidden;
      line-height: 1.5;
      transition: background-color 0.2s, color 0.2s;
    }

    /* ===== NAVEGACIÓN LATERAL IZQUIERDA ===== */
    .nav {
      width: 88px;
      background-color: var(--bg-nav);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.2rem 0.5rem;
      border-right: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
      overflow-y: auto;
    }

    .logo {
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: -0.5px;
      color: var(--accent);
      text-decoration: none;
      margin-bottom: 2rem;
      padding: 0.25rem;
      transition: opacity 0.2s;
    }

    .logo:hover {
      opacity: 0.8;
    }

    .nav-icons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      align-items: center;
      flex: 1;
    }

    .nav-icons a {
      display: block;
      width: 100%;
      text-align: center;
      padding: 0.6rem 0.2rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      border-radius: 12px;
      background-color: transparent;
      transition: background-color 0.15s, color 0.15s;
      word-break: break-word;
    }

    .nav-icons a:hover {
      background-color: var(--border-light);
      color: var(--text-primary);
    }

    .nav-icons a.active {
      background-color: var(--accent);
      color: white;
    }

    .nav-bottom {
      margin-top: auto;
      padding-top: 1rem;
      width: 100%;
    }

    #theme {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-primary);
      padding: 0.5rem 0.2rem;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    #theme:hover {
      background-color: var(--border-light);
    }

    #theme span {
      pointer-events: none;
    }

    /* ===== CONTENEDOR PRINCIPAL ===== */
    .main {
      display: flex;
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .sidebar {
      width: 280px;
      background-color: var(--bg-sidebar);
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      padding: 1.25rem 1rem;
      overflow-y: auto;
      flex-shrink: 0;
    }

    #new-chat {
      background-color: var(--accent);
      color: white;
      font-weight: 600;
      border: none;
      padding: 0.75rem 1rem;
      border-radius: 30px;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      transition: background 0.2s;
      box-shadow: var(--shadow-sm);
    }

    #new-chat:hover {
      background-color: var(--accent-hover);
    }

    .recent-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      padding-left: 0.25rem;
    }

    #chats {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    #chats li {
      padding: 0.6rem 0.75rem;
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.15s;
    }

    #chats li:hover {
      background-color: var(--border-light);
    }

    /* ===== ÁREA DE CHAT ===== */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-chat);
      min-width: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .ditters-container {
      padding: 2rem 2.5rem;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }

    .ditters-header {
      margin-bottom: 2rem;
    }

    .ditters-header h2 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .module {
      background: var(--bg-sidebar);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 1.8rem;
      box-shadow: var(--shadow-sm);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      display: block;
      color: var(--text-secondary);
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 0.8rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--border-light);
      background: var(--bg-body);
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
      transition: border 0.15s, box-shadow 0.15s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 1.5rem 0;
    }

    .btn {
      padding: 0.8rem 1.8rem;
      border-radius: 40px;
      border: none;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      box-shadow: var(--shadow-sm);
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--bg-body);
      color: var(--accent);
      border: 1px solid var(--border-light);
    }

    .btn-secondary:hover {
      background: var(--border-light);
    }

    .output {
      background: var(--bg-chat);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 1.5rem;
      margin-top: 1rem;
    }

    .output strong {
      display: block;
      margin-bottom: 1rem;
      color: var(--accent);
    }

    .placeholder {
      min-height: 80px;
      background: var(--bg-body);
      border-radius: 12px;
      padding: 1.2rem;
      border: 1px dashed var(--border-light);
    }

    .log {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* Responsive */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .nav {
        width: 100%;
        height: auto;
        flex-direction: row;
        padding: 0.5rem 1rem;
        border-right: none;
        border-bottom: 1px solid var(--border-light);
        overflow-x: auto;
        justify-content: space-between;
      }

      .logo {
        margin-bottom: 0;
        margin-right: 0.5rem;
        font-size: 1.3rem;
      }

      .nav-icons {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 0.25rem;
        flex: 1;
        justify-content: flex-start;
      }

      .nav-icons a {
        width: auto;
        padding: 0.4rem 0.8rem;
        font-size: 0.8rem;
      }

      .nav-bottom {
        margin-top: 0;
        padding-top: 0;
        width: auto;
      }

      #theme {
        width: auto;
        padding: 0.4rem 1rem;
      }

      .main {
        flex-direction: column;
        height: calc(100vh - 70px);
      }

      .sidebar {
        width: 100%;
        max-height: 140px;
        border-right: none;
        border-bottom: 1px solid var(--border-light);
        padding: 0.75rem;
      }

      .chat-area {
        height: auto;
        flex: 1;
      }

      .ditters-container {
        padding: 1.5rem 1rem;
      }

      .row {
        grid-template-columns: 1fr;
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background-color: var(--border-light);
      border-radius: 20px;
    }

    *:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    button,
    a {
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- Barra lateral fija (navegación) -->
  <nav class="nav" aria-label="Navegación principal" role="navigation">
    <a class="logo" href="../index.html" aria-label="Korbux inicio">Korbux</a>

    <!-- Accesos a agentes (activo en Ditters) -->
    <div class="nav-icons" aria-label="Agentes disponibles">
      <a href="okuota.html" title="Okuota">Okuota</a>
      <a href="Monet.html" title="Monet">Monet</a>
      <a href="Ditters.html" class="active" aria-current="page" title="Ditters">Ditters</a>
      <a href="Jean.html" title="Jean">Jean</a>
      <a href="Lovelace.html" title="Lovelace">Lovelace</a>
      <a href="Santa_olalla.html" title="Santa Olalla">Santa Olalla</a>
      <a href="../Perfil.html" title="Perfil">Perfil</a>
      <a href="../Historial.html" title="Historial">Historial</a>
    </div>

    <!-- Botón de tema -->
    <div class="nav-bottom">
      <button id="theme" type="button" aria-pressed="false" aria-label="Cambiar tema">
        <span>Tema</span>
      </button>
    </div>
  </nav>

  <!-- Área principal (sidebar + chat) -->
  <main class="main" id="main-content">

    <!-- Sidebar de chats recientes -->
    <aside class="sidebar" aria-label="Chats recientes">
      <button id="new-chat" type="button" aria-label="Crear nuevo chat">
        <span>+</span> Nuevo Chat
      </button>

      <h2 class="recent-title" id="recent-chats-title">Chats recientes</h2>
      <ul id="chats" aria-live="polite" aria-labelledby="recent-chats-title"></ul>
    </aside>

    <!-- Área de contenido Ditters -->
    <section class="chat-area" aria-label="Área de generación musical Ditters">
      <div class="ditters-container">
        <div class="ditters-header">
          <h2>🎵 Ditters · Generador musical</h2>
          <p style="color: var(--text-secondary); margin-top: 0.5rem;">Crea composiciones conceptuales con estilo e
            instrumentación.</p>
        </div>

        <!-- Módulo de música -->
        <div class="module" id="modulo-musica">
          <div class="row">
            <div>
              <label for="estilo-musical">Estilo musical</label>
              <select id="estilo-musical">
                <option value="clasica">Clásica</option>
                <option value="barroco">Barroco</option>
                <option value="romantico">Romántico</option>
                <option value="jazz">Jazz</option>
                <option value="rock">Rock</option>
                <option value="electronica">Electrónica</option>
                <option value="hiphop">Hip-Hop</option>
                <option value="reggaeton">Reggaetón</option>
                <option value="experimental">Experimental</option>
              </select>
            </div>
            <div>
              <label for="instrumentos">Instrumentos</label>
              <input id="instrumentos" type="text" placeholder="Ej. piano, violín, sintetizador" />
            </div>
          </div>
          <div class="row">
            <div>
              <label for="tempo">Tempo (BPM)</label>
              <input id="tempo" type="number" min="40" max="240" placeholder="Ej. 120" />
            </div>
            <div>
              <label for="duracion">Duración (minutos)</label>
              <input id="duracion" type="number" min="1" max="60" placeholder="Ej. 3" />
            </div>
          </div>
          <div class="row">
            <div>
              <label for="tonalidad">Tonalidad</label>
              <input id="tonalidad" type="text" placeholder="Ej. Do mayor" />
            </div>
            <div>
              <label for="compases">Compases totales</label>
              <input id="compases" type="number" min="4" step="4" placeholder="Ej. 64" />
            </div>
          </div>
          <div class="row full">
            <label for="estructura">Estructura</label>
            <textarea id="estructura" placeholder="Ej. Intro (8), Desarrollo (32), Clímax (16), Final (8)"></textarea>
          </div>
          <div class="row full">
            <label for="descripcion-musica">Descripción / notas</label>
            <textarea id="descripcion-musica"
              placeholder="Ej. Composición con influencia barroca y toques electrónicos..."></textarea>
          </div>
          <div class="actions">
            <button class="btn btn-primary" id="generar-musica">Generar música</button>
            <button class="btn btn-secondary" id="reset-musica">Limpiar</button>
          </div>
          <div class="output full">
            <strong>Composición generada:</strong>
            <div id="salida-musica" class="placeholder">[aquí se mostraría la composición]</div>
            <div id="log-musica" class="log"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Lógica JavaScript (LokiJS, tema, generación musical) -->
  <script>
    (function () {
      // ---------- TEMA ----------
      const themeBtn = document.getElementById('theme');
      function initTheme() {
        const savedTheme = localStorage.getItem('korbux-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
          document.body.classList.add('dark');
          themeBtn.setAttribute('aria-pressed', 'true');
        } else {
          themeBtn.setAttribute('aria-pressed', 'false');
        }
      }
      initTheme();

      themeBtn.addEventListener('click', () => {
        const isDark = document.body.classList.toggle('dark');
        themeBtn.setAttribute('aria-pressed', isDark ? 'true' : 'false');
        localStorage.setItem('korbux-theme', isDark ? 'dark' : 'light');
      });

      // ---------- BASE DE DATOS LOKIJS ----------
      const db = new loki("korbux.json", {
        autoload: true,
        autosave: true,
        autosaveInterval: 5000,
        autoloadCallback: () => {
          if (!db.getCollection("musica")) db.addCollection("musica", { indices: ["estilo"] });
          if (!db.getCollection("auditoria")) db.addCollection("auditoria");
          precargarEjemplos();
        },
      });

      function auditar(entry) {
        const auditoria = db.getCollection("auditoria");
        if (auditoria) {
          auditoria.insert({ ...entry, fecha: new Date().toISOString(), modulo: "Ditters", usuario: "daniel_korbux" });
        }
      }

      function setOutput(el, html) { el.innerHTML = html; }

      function precargarEjemplos() {
        const musica = db.getCollection("musica");
        if (musica.count() > 0) return;
        const ejemplos = [
          { estilo: "clasica", instrumentos: "orquesta", tempo: 90, duracion: 10, tonalidad: "Do mayor", compases: 128, estructura: "Sinfonía en 4 movimientos", descripcion: "Ejemplo clásico barroco", fecha: new Date().toISOString() },
          { estilo: "electronica", instrumentos: "sintetizador, caja de ritmos", tempo: 128, duracion: 5, tonalidad: "La menor", compases: 64, estructura: "Intro, drop, build, outro", descripcion: "Beat electrónico moderno", fecha: new Date().toISOString() }
        ];
        ejemplos.forEach(e => musica.insert(e));
        auditar({ tipo: "precarga", campo: "musica", nuevo: `Precargados ${ejemplos.length} ejemplos` });
      }

      // ---------- GENERADOR MUSICAL ----------
      document.getElementById("generar-musica").addEventListener("click", () => {
        const estilo = document.getElementById("estilo-musical").value;
        const instrumentos = document.getElementById("instrumentos").value.trim();
        const tempo = document.getElementById("tempo").value.trim();
        const duracion = document.getElementById("duracion").value.trim();
        const tonalidad = document.getElementById("tonalidad").value.trim();
        const compases = document.getElementById("compases").value.trim();
        const estructura = document.getElementById("estructura").value.trim();
        const descripcion = document.getElementById("descripcion-musica").value.trim();

        if (!estilo || !instrumentos) {
          setOutput(document.getElementById("salida-musica"), "Error: estilo e instrumentos son obligatorios.");
          return;
        }

        const musica = db.getCollection("musica");
        const payload = { estilo, instrumentos, tempo, duracion, tonalidad, compases, estructura, descripcion, fecha: new Date().toISOString() };
        musica.insert(payload);
        auditar({ tipo: "composicion", campo: "musica", nuevo: JSON.stringify(payload).slice(0, 200) + "…" });

        setOutput(document.getElementById("salida-musica"),
          `<p><strong>Estilo:</strong> ${estilo}</p>
           <p><strong>Instrumentos:</strong> ${instrumentos}</p>
           <p><strong>Tempo:</strong> ${tempo || "—"} BPM</p>
           <p><strong>Duración:</strong> ${duracion || "—"} min</p>
           <p><strong>Tonalidad:</strong> ${tonalidad || "—"}</p>
           <p><strong>Compases:</strong> ${compases || "—"}</p>
           <p><strong>Estructura:</strong> ${estructura || "(sin estructura)"}</p>
           <p><strong>Notas:</strong> ${descripcion || "(sin notas)"}</p>
           <p>🎼 Composición conceptual generada y registrada.</p>`
        );
        document.getElementById("log-musica").textContent = "Composición guardada.";
      });

      document.getElementById("reset-musica").addEventListener("click", () => {
        ["estilo-musical", "instrumentos", "tempo", "duracion", "tonalidad", "compases", "estructura", "descripcion-musica"].forEach(id => {
          const el = document.getElementById(id);
          if (el.tagName === "SELECT") el.selectedIndex = 0; else el.value = "";
        });
        setOutput(document.getElementById("salida-musica"), "[aquí se mostraría la composición]");
        document.getElementById("log-musica").textContent = "";
      });

    })();
  </script>
</body>

</html>
